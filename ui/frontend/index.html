<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meme Classifier</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="app-container">
      
      <!-- HEADER -->
      <header class="app-header">
        <div class="title-container">
          <h1>Meme Classifier</h1>
        </div>
      </header>

      <!-- MAIN WORKSPACE -->
      <main class="workspace">
        
        <!-- SIDEBAR -->
        <aside class="sidebar glass-panel">
          
          <div class="input-section">
            <label class="btn-primary" for="file-upload">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
              Upload Meme Image
            </label>
            <input id="file-upload" type="file" accept="image/*" hidden />
          </div>

          <div class="input-section">
            <textarea id="text-input" placeholder="Enter tweet text (optional)..." class="text-input glass-input"></textarea>
          </div>

          <button id="run-btn" class="btn-secondary" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg>
            Run Pipeline
          </button>
          
          <div class="preview-container">
            <img id="image-preview" src="" alt="Preview" hidden/>
          </div>

        </aside>

        <!-- PIPELINE CANVAS -->
        <section class="canvas glass-panel">
          
          <!-- Nodes -->
          <div class="node-graph">
            
            <div class="node-container input-node" id="node-input">
              <div class="node-icon icon-input">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
              </div>
              <span class="node-label">Input Data</span>
            </div>
            
            <div class="path-horizontal p1"></div>
            
            <!-- Splitting into two paths -->
            <div class="branches">
              <div class="branch branch-top">
                <div class="path-vertical"></div>
                <div class="path-horizontal-small"></div>
                <div class="node-container encoder-node" id="node-img-enc">
                  <div class="node-icon icon-img">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                  </div>
                  <span class="node-label">Image Encoder (ResNet)</span>
                </div>
                <div class="path-horizontal-small"></div>
                <div class="path-vertical-down"></div>
              </div>
              
              <div class="branch branch-bottom">
                <div class="path-vertical"></div>
                <div class="path-horizontal-small"></div>
                <div class="node-container encoder-node" id="node-txt-enc">
                  <div class="node-icon icon-txt">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                  </div>
                  <span class="node-label">Text Encoder (BiLSTM)</span>
                </div>
                <div class="path-horizontal-small"></div>
                <div class="path-vertical-up"></div>
              </div>
            </div>

            <div class="path-horizontal p2"></div>

            <div class="node-container fusion-node" id="node-fusion">
              <div class="node-icon icon-fusion">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
              </div>
              <span class="node-label">Multimodal Fusion</span>
            </div>

            <div class="path-horizontal p3"></div>

            <div class="node-container classifier-node" id="node-clf">
              <div class="node-icon icon-clf">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
              </div>
              <span class="node-label">MLP Classifier</span>
            </div>

            <div class="path-horizontal p4"></div>

            <div class="node-container output-node" id="node-output">
              <div class="node-icon icon-output">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
              </div>
              <span class="node-label">Output</span>
            </div>

          </div>

          <!-- Bottom Dashboard Results -->
          <div class="results-dashboard hidden" id="results-panel">
            <div class="metric-row">
              <div class="metric-card">
                <span class="metric-label">STAGE 1: BINARY</span>
                <span class="metric-value" id="res-binary">-</span>
              </div>
              <div class="metric-card">
                <span class="metric-label">STAGE 2: MULTICLASS</span>
                <span class="metric-value highlight-text" id="res-class">-</span>
              </div>
              <div class="metric-card">
                <span class="metric-label">CONFIDENCE</span>
                <span class="metric-value" id="res-conf">-</span>
              </div>
            </div>
            
            <div class="metric-row details-row">
              <div class="metric-card large-card">
                <span class="metric-label">OCR TEXT</span>
                <span class="metric-value small-text" id="res-ocr">-</span>
              </div>
            </div>
            <div class="metric-row details-row">
              <div class="metric-card large-card">
                <span class="metric-label">MODELS USED</span>
                <span class="metric-value small-text" id="res-models">-</span>
              </div>
            </div>
          </div>

        </section>

      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
